name: tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  pinned-hermes-contract:
    name: Pinned Hermes v2026.6.5 compatibility (blocking)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check out pinned Hermes Agent v2026.6.5
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: NousResearch/hermes-agent
          ref: v2026.6.5
          path: _hermes-agent
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Verify immutable pinned Hermes commit
        shell: bash
        run: |
          actual=$(git -C _hermes-agent rev-parse HEAD)
          expected=3c231eb3979ab9c57d5cd6d02f1d577a3b718b43
          echo "Hermes v2026.6.5 resolved commit: $actual"
          test "$actual" = "$expected"
      - name: Run pinned AST/byte contract and trusted plugin checks
        run: |
          python scripts/check_hermes_contract.py --source-root _hermes-agent --require-pinned-bytes
          python scripts/test_hermes_contract.py
      - name: Run durable-spool suite against trusted vendored contract
        run: python scripts/test_hermes_spool.py

  upstream-hermes-advisory:
    name: "ADVISORY: latest Hermes main compatibility (schedule/manual only)"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check out latest Hermes Agent main (advisory only)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: NousResearch/hermes-agent
          ref: main
          path: _hermes-agent-main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Log advisory scope
        run: |
          echo "ADVISORY ONLY: checking moving NousResearch/hermes-agent main."
          echo "Failures here do not gate memoryd push or pull-request jobs."
          git -C _hermes-agent-main rev-parse HEAD
      - name: Run advisory AST compatibility check
        id: compatibility
        continue-on-error: true
        run: python scripts/check_hermes_contract.py --source-root _hermes-agent-main
      - name: Publish advisory compatibility outcome
        if: always()
        env:
          COMPATIBILITY_OUTCOME: ${{ steps.compatibility.outcome }}
        run: |
          if [ "$COMPATIBILITY_OUTCOME" = "success" ]; then
            echo "### Hermes main advisory: compatible" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Hermes main compatibility drift::The AST contract check failed; pinned push/PR compatibility is unaffected."
            echo "### ⚠️ Hermes main advisory: incompatible" >> "$GITHUB_STEP_SUMMARY"
            echo "Moving main drifted from the pinned memory-provider contract." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Surface advisory incompatibility
        if: always() && steps.compatibility.outcome != 'success'
        run: |
          echo "Advisory failure is visible only on schedule/manual runs."
          exit 1

  hermes-spool:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run cross-platform Hermes durable-spool checks
        run: python scripts/test_hermes_spool.py

  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    # PostgreSQL 16 + pgvector, matching the daemon's datastore. Same image
    # `memoryd install` provisions locally.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: memoryd
          POSTGRES_DB: memoryd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MEMORYD_DSN: postgresql://postgres:memoryd@localhost:5432/memoryd
      MEMORYD_HOME: ${{ runner.temp }}/memoryd-home
      MEMORYD_LLM: mock
      MEMORYD_LLM_MOCK_FILE: ${{ runner.temp }}/mock_llm.json
      HERMES_SOURCE_ROOT: ${{ github.workspace }}/_hermes-agent
      # embedder defaults to the offline hash embedder — no external calls

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check out exact pinned Hermes runtime
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: NousResearch/hermes-agent
          ref: v2026.6.5
          path: _hermes-agent

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify pinned Hermes commit and PostgreSQL client
        run: |
          test "$(git -C _hermes-agent rev-parse HEAD)" = \
            "3c231eb3979ab9c57d5cd6d02f1d577a3b718b43"
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16
          pg_dump --version | grep -E ' 16\.'

      - name: Build wheel in an isolated environment
        run: |
          python -m venv .venv-build
          .venv-build/bin/python -m pip install --disable-pip-version-check build
          .venv-build/bin/python -m build --wheel --outdir dist

      - name: Install exact memoryd wheel and pinned Hermes runtime
        run: |
          python -m venv "$RUNNER_TEMP/venv-test"
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl')
          test "${#wheels[@]}" -eq 1
          "$RUNNER_TEMP/venv-test/bin/python" -m pip install --disable-pip-version-check \
            "${wheels[0]}" pytest "$HERMES_SOURCE_ROOT"
          "$RUNNER_TEMP/venv-test/bin/python" -m pip check
          echo "$RUNNER_TEMP/venv-test/bin" >> "$GITHUB_PATH"
          echo "MEMORYD_WHEEL=$GITHUB_WORKSPACE/${wheels[0]}" >> "$GITHUB_ENV"

      - name: Assert installed package and plugin origins
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv-test/bin/python" -I - <<'PY'
          import importlib.metadata
          import site
          from pathlib import Path
          import agent.memory_provider
          import memoryd
          prefix = Path(__import__('sys').prefix).resolve()
          checkout = Path(__import__('os').environ['GITHUB_WORKSPACE']).resolve()
          site_packages = [Path(value).resolve() for value in site.getsitepackages()]
          daemon = Path(memoryd.__file__).resolve()
          hermes_contract = Path(agent.memory_provider.__file__).resolve()
          plugin = daemon.parent / 'hermes_plugin'
          assert any(prefix == root or prefix in root.parents for root in site_packages)
          for label, path in {
              'memoryd': daemon,
              'Hermes contract': hermes_contract,
              'wheel-bundled plugin': plugin,
          }.items():
              assert checkout not in path.parents, (label, path)
              assert any(root in path.parents for root in site_packages), (label, path)
          assert (plugin / '__init__.py').is_file()
          assert (plugin / 'spool.py').is_file()
          assert importlib.metadata.version('memoryd') == '0.3.0'
          assert importlib.metadata.version('hermes-agent') == '0.16.0'
          print(f"installed memoryd: {daemon}")
          print(f"installed Hermes contract: {hermes_contract}")
          print(f"installed wheel plugin: {plugin}")
          PY
          plugin_source=$("$RUNNER_TEMP/venv-test/bin/python" -I -c \
            "from pathlib import Path; import memoryd; print((Path(memoryd.__file__).resolve().parent / 'hermes_plugin'))")
          echo "MEMORYD_PLUGIN_SOURCE=$plugin_source" >> "$GITHUB_ENV"

      - name: Run checkout unit and fault-injection suites
        run: |
          VENV_PYTHON="$RUNNER_TEMP/venv-test/bin/python"
          "$VENV_PYTHON" -m compileall -q memoryd hermes_plugin scripts tests
          "$VENV_PYTHON" -m pytest -q tests
          "$VENV_PYTHON" scripts/test_durable_capture.py
          "$VENV_PYTHON" scripts/test_hermes_spool.py
          "$VENV_PYTHON" scripts/test_bitter_lesson.py
          "$VENV_PYTHON" scripts/test_hermes_contract.py

      - name: Stage installed-artifact harnesses outside checkout
        run: |
          set -euo pipefail
          INSTALLED_HARNESS="$RUNNER_TEMP/installed-harness"
          test ! -e "$INSTALLED_HARNESS"
          mkdir -p "$INSTALLED_HARNESS/scripts/_stubs/agent"
          cp scripts/smoke_test.py scripts/test_extract.py scripts/test_vector.py \
            scripts/test_bitter_lesson.py scripts/test_hermes.py \
            scripts/test_postgres_recovery.py \
            scripts/check_hermes_contract.py scripts/validate_installed_hermes.py \
            "$INSTALLED_HARNESS/scripts/"
          cp scripts/_stubs/agent/__init__.py \
            scripts/_stubs/agent/memory_provider.py \
            "$INSTALLED_HARNESS/scripts/_stubs/agent/"
          INSTALLED_HARNESS="$INSTALLED_HARNESS" \
            "$RUNNER_TEMP/venv-test/bin/python" -I - <<'PY'
          import os
          import shutil
          from pathlib import Path
          import memoryd
          root = Path(os.environ['INSTALLED_HARNESS']).resolve()
          package = Path(memoryd.__file__).resolve().parent
          plugin = package / 'hermes_plugin'
          shutil.copytree(plugin, root / 'hermes_plugin' / 'memoryd')
          shutil.copytree(package / 'migrations', root / 'migrations')
          assert not (root / 'memoryd').exists()
          PY
          echo "INSTALLED_HARNESS=$INSTALLED_HARNESS" >> "$GITHUB_ENV"

      - name: Validate installed Hermes loader and lifecycle
        run: |
          set -euo pipefail
          cd "$INSTALLED_HARNESS"
          "$RUNNER_TEMP/venv-test/bin/python" -I scripts/check_hermes_contract.py --require-pinned-bytes
          "$RUNNER_TEMP/venv-test/bin/python" -I \
            scripts/validate_installed_hermes.py \
            --hermes-home "$RUNNER_TEMP/hermes-installed-profile" \
            --plugin-source "$MEMORYD_PLUGIN_SOURCE" \
            --expected-version 0.16.0
          "$RUNNER_TEMP/venv-test/bin/python" -I \
            scripts/test_bitter_lesson.py

      - name: Apply packaged migrations 001 through 007
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv-test/bin/python" -I - <<'PY'
          import os
          import psycopg
          from memoryd.cli import apply_migrations
          expected = [
              '001_init.sql',
              '002_extraction.sql',
              '003_multi_agent.sql',
              '004_quarantine_event.sql',
              '005_bitter_lesson.sql',
              '006_durable_capture.sql',
              '007_api_request_ledger.sql',
          ]
          applied = apply_migrations(os.environ['MEMORYD_DSN'])
          with psycopg.connect(os.environ['MEMORYD_DSN']) as connection:
              actual = [row[0] for row in connection.execute(
                  'SELECT filename FROM schema_migrations ORDER BY filename')]
          assert applied == expected, applied
          assert actual == expected, actual
          print(f"applied packaged migrations: {actual}")
          PY

      - name: Run installed-wheel DB-backed regression matrix
        run: |
          set -euo pipefail
          cd "$INSTALLED_HARNESS"
          echo "[]" > "$MEMORYD_LLM_MOCK_FILE"
          "$RUNNER_TEMP/venv-test/bin/python" -I -m memoryd.server \
            > "$RUNNER_TEMP/memoryd.out" 2>&1 &
          daemon=$!
          cleanup() {
            kill "$daemon" 2>/dev/null || true
            wait "$daemon" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:7437/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          if [ "${ok:-}" != "1" ]; then
            echo "daemon did not become healthy"
            cat "$RUNNER_TEMP/memoryd.out"
            exit 1
          fi
          "$RUNNER_TEMP/venv-test/bin/python" -I scripts/smoke_test.py
          "$RUNNER_TEMP/venv-test/bin/python" -I scripts/test_extract.py
          "$RUNNER_TEMP/venv-test/bin/python" -I scripts/test_vector.py
          "$RUNNER_TEMP/venv-test/bin/python" -I \
            scripts/test_hermes.py --installed \
            --hermes-home "$RUNNER_TEMP/hermes-live-profile" \
            --plugin-source "$MEMORYD_PLUGIN_SOURCE" \
            --expected-version 0.16.0
          "$RUNNER_TEMP/venv-test/bin/python" -I \
            scripts/test_postgres_recovery.py idempotency
          "$RUNNER_TEMP/venv-test/bin/python" -I -m memoryd doctor
          cleanup
          trap - EXIT

      - name: Run installed-wheel offline backup and disposable restore
        run: |
          cd "$INSTALLED_HARNESS"
          "$RUNNER_TEMP/venv-test/bin/python" -I \
            scripts/test_postgres_recovery.py backup-restore

      - name: Daemon log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/memoryd.out" || true
